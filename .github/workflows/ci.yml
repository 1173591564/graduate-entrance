name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: uv run mypy src tests
      - run: uv run pytest
      - run: uv run python -m graduate_entrance.openapi > ../web/openapi.json
      - run: git diff --exit-code -- ../web/openapi.json

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run generate:api
      - run: git diff --exit-code -- src/generated/api.ts
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon lint testDebugUnitTest assembleDebug

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
