name: graduate-entrance

services:
  database:
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-graduate_entrance}
      POSTGRES_USER: ${POSTGRES_USER:-graduate_entrance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/10-extensions.sql:ro
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-graduate_entrance} -d ${POSTGRES_DB:-graduate_entrance}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENVIRONMENT: local
      APP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-graduate_entrance}:${POSTGRES_PASSWORD:-local-development-only}@database:5432/${POSTGRES_DB:-graduate_entrance}
      APP_CORS_ORIGINS: '["http://localhost:${WEB_PORT:-8080}"]'
      APP_SYLLABUS_RAW_DIR: /app/seed/syllabus/raw
    ports:
      - "${API_BIND:-127.0.0.1}:${API_PORT:-8000}:8000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/live')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./web
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
